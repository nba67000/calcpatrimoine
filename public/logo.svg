<!-- public/logo.svg -->
<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dégradé bleu électrique -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Carré arrondi avec dégradé -->
  <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#logoGradient)" />
  
  <!-- Lettre C -->
  <text x="22" y="32" font-family="system-ui, -apple-system, sans-serif" 
        font-size="28" font-weight="700" fill="white" 
        text-anchor="middle" letter-spacing="-0.5">C</text>
  
  <!-- Point d'accent cyan -->
  <circle cx="38" cy="6" r="4" fill="#06b6d4" stroke="white" stroke-width="2" />
</svg>
