<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Spacing</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px 24px; font-family: var(--font-sans); background:#fff; }
  .row { display:flex; align-items:center; gap:12px; padding:4px 0; font-size:11px; color:var(--fg-3); }
  .bar { background: var(--primary-600); height: 10px; border-radius: 2px; }
  .token { font-family: var(--font-mono); width: 60px; color: var(--fg-2); }
  .val { font-family: var(--font-mono); color: var(--fg-4); margin-left:auto; }
  h3 { margin:0 0 4px 0; font-size:14px; font-weight:600; color:var(--fg-1); }
  p.sub { margin:0 0 12px 0; font-size:12px; color:var(--fg-4); }
</style>
</head>
<body>
  <h3>Spacing scale</h3>
  <p class="sub">Tailwind-aligned rem steps + three custom tokens (18, 88, 128).</p>
  <div class="row"><span class="token">space-1</span><span class="bar" style="width:4px"></span><span class="val">0.25rem · 4px</span></div>
  <div class="row"><span class="token">space-2</span><span class="bar" style="width:8px"></span><span class="val">0.5rem · 8px</span></div>
  <div class="row"><span class="token">space-3</span><span class="bar" style="width:12px"></span><span class="val">0.75rem · 12px</span></div>
  <div class="row"><span class="token">space-4</span><span class="bar" style="width:16px"></span><span class="val">1rem · 16px</span></div>
  <div class="row"><span class="token">space-6</span><span class="bar" style="width:24px"></span><span class="val">1.5rem · 24px</span></div>
  <div class="row"><span class="token">space-8</span><span class="bar" style="width:32px"></span><span class="val">2rem · 32px</span></div>
  <div class="row"><span class="token">space-12</span><span class="bar" style="width:48px"></span><span class="val">3rem · 48px</span></div>
  <div class="row"><span class="token">space-16</span><span class="bar" style="width:64px"></span><span class="val">4rem · 64px · py-16 section</span></div>
  <div class="row"><span class="token">space-18</span><span class="bar" style="width:72px"></span><span class="val">4.5rem · 72px · custom</span></div>
</body>
</html>
