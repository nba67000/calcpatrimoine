<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Trust markers</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px; font-family: var(--font-sans); background: linear-gradient(to bottom, #E8EEF5, #fff); }
  .bar { display:flex; flex-wrap:wrap; gap:18px 28px; justify-content:center; }
  .item { display:flex; align-items:center; gap:6px; font-size:13px; color: var(--fg-3); font-weight:500; }
  .dot { width:8px; height:8px; border-radius:9999px; background: var(--primary-600); }
  h3 { text-align:center; font-size: 22px; font-weight: 700; color: var(--fg-1); margin: 0 0 4px 0; }
  p { text-align:center; font-size:13px; color: var(--fg-3); margin: 0 0 16px 0; }
</style>
</head>
<body>
  <h3>Calculateurs gratuits pour vos décisions patrimoniales</h3>
  <p>Outils open-source. Aucune donnée conservée.</p>
  <div class="bar">
    <div class="item"><span class="dot"></span> 100% gratuit</div>
    <div class="item"><span class="dot"></span> Open-source</div>
    <div class="item"><span class="dot"></span> Zéro tracking</div>
    <div class="item"><span class="dot"></span> Tables INSEE officielles</div>
  </div>
</body>
</html>
