<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Color scale — Accent & Warning</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: #fff; }
  .group { margin-bottom: 16px; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw { border-radius: 6px; height: 52px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px; color:#fff; font-size:10px; font-family:var(--font-mono); }
  .sw.dark { color: #78350F; }
  .empty { background: repeating-linear-gradient(45deg, #F1F5F9, #F1F5F9 6px, #E2E8F0 6px, #E2E8F0 12px); }
  h3 { margin: 0 0 2px 0; font-size: 13px; font-weight: 600; color: var(--fg-1); }
  p.sub { margin: 0 0 8px 0; font-size: 11px; color: var(--fg-4); }
</style>
</head>
<body>
  <div class="group">
    <h3>Accent — Or / ambré <span style="font-weight:400;color:var(--fg-4);font-size:11px">· held in reserve</span></h3>
    <p class="sub">Defined but unused in shipped UI. Premium shadow recipe only.</p>
    <div class="row">
      <div class="empty sw"></div>
      <div class="sw dark" style="background:#F5EFE0">100</div>
      <div class="sw dark" style="background:#EBE0C1">200</div>
      <div class="sw dark" style="background:#E5C77F">300</div>
      <div class="sw dark" style="background:#D4AF37">400</div>
      <div class="sw" style="background:#B8860B">500</div>
      <div class="sw" style="background:#9A7209">600</div>
      <div class="sw" style="background:#7C5E07">700</div>
      <div class="empty sw"></div>
      <div class="empty sw"></div>
    </div>
  </div>
  <div class="group">
    <h3>Warning — Ambre <span style="font-weight:400;color:var(--fg-4);font-size:11px">· disclaimers only</span></h3>
    <p class="sub">The one non-primary color in shipped UI. Never for generic errors.</p>
    <div class="row">
      <div class="sw dark" style="background:#FFFBEB">50</div>
      <div class="sw dark" style="background:#FEF3C7">100</div>
      <div class="sw dark" style="background:#FDE68A">200</div>
      <div class="sw dark" style="background:#FCD34D">300</div>
      <div class="sw dark" style="background:#FBBF24">400</div>
      <div class="sw" style="background:#F59E0B">500</div>
      <div class="sw" style="background:#D97706">600</div>
      <div class="sw" style="background:#B45309">700</div>
      <div class="sw" style="background:#92400E">800</div>
      <div class="sw" style="background:#78350F">900</div>
    </div>
  </div>
</body>
</html>
