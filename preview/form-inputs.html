<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Form inputs</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px 24px; font-family: var(--font-sans); background:#fff; }
  .field { margin-bottom:16px; }
  .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  label { font-size:13px; color: var(--fg-3); }
  .num-input { width:90px; padding:6px 10px; font-size:16px; font-weight:500; text-align:center; border:1px solid var(--border-strong); border-radius:8px; outline:none; font-family:var(--font-sans); }
  .num-input:focus { border-color:transparent; box-shadow: 0 0 0 2px var(--primary-500); }
  .unit { font-size:15px; color: var(--fg-3); font-weight:500; margin-left:6px; }
  input[type=range] { width:100%; height:24px; -webkit-appearance:none; -moz-appearance:none; appearance:none; background:transparent; margin:0; padding:0; display:block; cursor:pointer; }
  input[type=range]:focus { outline:none; }
  input[type=range]::-webkit-slider-runnable-track { height:8px; border-radius:9999px; background: linear-gradient(to right, #D1DDE9, #2E4A6F); border:1px solid #CBD5E1; box-shadow: inset 0 1px 2px rgba(15,23,42,0.08); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; height:22px; width:22px; border-radius:50%; background:#2E4A6F; border:3px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.25); margin-top:-8px; }
  input[type=range]::-moz-range-track { height:8px; border-radius:9999px; background: linear-gradient(to right, #D1DDE9, #2E4A6F); border:1px solid #CBD5E1; box-shadow: inset 0 1px 2px rgba(15,23,42,0.08); }
  input[type=range]::-moz-range-thumb { height:22px; width:22px; border-radius:50%; background:#2E4A6F; border:3px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.25); }
  .bounds { display:flex; justify-content:space-between; font-size:11px; color:var(--fg-5); margin-top:4px; font-family:var(--font-mono); }
  .tip { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; margin-left:4px; color:var(--fg-5); }
</style>
</head>
<body>
  <div class="field">
    <div class="head">
      <label>Votre âge <span class="tip">ⓘ</span></label>
      <div><input class="num-input" value="65"/><span class="unit">ans</span></div>
    </div>
    <input type="range" min="50" max="90" value="65"/>
    <div class="bounds"><span>50 ans</span><span>90 ans</span></div>
  </div>
  <div class="field">
    <div class="head">
      <label>Capital disponible</label>
      <div><input class="num-input" style="width:120px;text-align:right" value="150 000"/><span class="unit">€</span></div>
    </div>
    <input type="range" min="10000" max="500000" value="150000"/>
    <div class="bounds"><span>10 k€</span><span>500 k€</span></div>
  </div>
</body>
</html>
