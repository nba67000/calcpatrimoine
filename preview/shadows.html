<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Shadows</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:28px 24px; font-family: var(--font-sans); background: var(--neutral-50); }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:18px; text-align:center; }
  .tile { height: 84px; background:#fff; border-radius: 8px; display:flex; align-items:center; justify-content:center; color:var(--fg-3); font-family:var(--font-mono); font-size:10px; }
  .label { margin-top:8px; font-size:10px; color:var(--fg-4); font-family:var(--font-mono); }
  h3 { margin:0 0 4px 0; font-size:14px; font-weight:600; color:var(--fg-1); }
  p.sub { margin: 0 0 14px 0; font-size:12px; color:var(--fg-4); }
</style>
</head>
<body>
  <h3>Elevation recipes</h3>
  <p class="sub">Five shadows. <code>premium</code> is amber-tinted and reserved.</p>
  <div class="row">
    <div>
      <div class="tile" style="box-shadow: var(--shadow-subtle)">subtle</div>
      <div class="label">pinned header</div>
    </div>
    <div>
      <div class="tile" style="box-shadow: var(--shadow-card)">card</div>
      <div class="label">default</div>
    </div>
    <div>
      <div class="tile" style="box-shadow: var(--shadow-card-hover)">card-hover</div>
      <div class="label">lift on hover</div>
    </div>
    <div>
      <div class="tile" style="box-shadow: var(--shadow-result)">result</div>
      <div class="label">hero result</div>
    </div>
    <div>
      <div class="tile" style="box-shadow: var(--shadow-premium)">premium</div>
      <div class="label">reserved</div>
    </div>
  </div>
</body>
</html>
