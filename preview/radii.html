<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; font-family: var(--font-sans); background:#fff; }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; text-align:center; }
  .tile { height: 72px; background: var(--primary-50); border: 1px solid var(--primary-200); display:flex; align-items:center; justify-content:center; color:var(--primary-700); font-family:var(--font-mono); font-size:11px; }
  .label { margin-top:6px; font-size:10px; color:var(--fg-4); font-family:var(--font-mono); }
  h3 { margin:0 0 4px 0; font-size:14px; font-weight:600; }
  p.sub { margin: 0 0 14px 0; font-size:12px; color:var(--fg-4); }
</style>
</head>
<body>
  <h3>Border radii</h3>
  <p class="sub">Modest. Cards use lg / xl. No pills (except genuine circles).</p>
  <div class="row">
    <div>
      <div class="tile" style="border-radius:2px">2px</div>
      <div class="label">sm</div>
    </div>
    <div>
      <div class="tile" style="border-radius:4px">4px</div>
      <div class="label">default</div>
    </div>
    <div>
      <div class="tile" style="border-radius:6px">6px</div>
      <div class="label">md · logo</div>
    </div>
    <div>
      <div class="tile" style="border-radius:8px">8px</div>
      <div class="label">lg · cards</div>
    </div>
    <div>
      <div class="tile" style="border-radius:12px">12px</div>
      <div class="label">xl · hero cards</div>
    </div>
  </div>
</body>
</html>
