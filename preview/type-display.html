<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Typography — Display & headings</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Roboto+Mono:wght@500;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px 24px; font-family: var(--font-sans); background:#fff; }
  .spec { display:flex; align-items:baseline; gap:16px; padding:8px 0; border-bottom: 1px solid var(--border-default); }
  .spec:last-child { border:none; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); min-width:140px; }
</style>
</head>
<body>
  <div class="spec"><span class="meta">display / 60 / 700</span><span class="display">2 458 € /mois</span></div>
  <div class="spec"><span class="meta">h1 / 48 / 700</span><span class="h1">Calculez votre rente</span></div>
  <div class="spec"><span class="meta">h2 / 30 / 700</span><span class="h2">Nos calculateurs</span></div>
  <div class="spec"><span class="meta">h3 / 24 / 600</span><span class="h3">Rente Viagère</span></div>
</body>
</html>
