<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Icons</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px 24px; font-family: var(--font-sans); background:#fff; }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
  .cell { text-align:center; padding: 14px 8px; border:1px solid var(--border-default); border-radius:8px; }
  .cell svg { display:block; margin: 0 auto 8px; }
  .name { font-family: var(--font-mono); font-size:11px; color:var(--fg-2); }
  .use { font-size: 10px; color: var(--fg-4); margin-top:2px; }
  h3 { margin:0 0 4px 0; font-size:14px; font-weight:600; }
  p.sub { margin:0 0 12px 0; font-size:12px; color:var(--fg-4); }
</style>
</head>
<body>
  <h3>The only three icons shipped</h3>
  <p class="sub">From <code>src/components/Icon.tsx</code>. Used narrowly — no library.</p>
  <div class="row">
    <div class="cell">
      <svg width="36" height="36" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#10B981"/><path d="M7 12.5L10.5 16L17 9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="name">check</div>
      <div class="use">Trust markers, "consultez…"</div>
    </div>
    <div class="cell">
      <svg width="36" height="36" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#DC2626"/><path d="M8 8L16 16M16 8L8 16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      <div class="name">cross</div>
      <div class="use">"ne constitue pas…"</div>
    </div>
    <div class="cell">
      <svg width="36" height="36" viewBox="0 0 24 24"><path d="M12 2L23 21H1L12 2Z" fill="#F59E0B" stroke="#F59E0B" stroke-linejoin="round"/><path d="M12 9V14" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="17.5" r="1.2" fill="#fff"/></svg>
      <div class="name">warning</div>
      <div class="use">Disclaimer heading</div>
    </div>
  </div>
</body>
</html>
